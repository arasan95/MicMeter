name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true

jobs:
  build:
    name: Build and test
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore tests/MicMeter.Tests/MicMeter.Tests.csproj

      - name: Build
        run: dotnet build tests/MicMeter.Tests/MicMeter.Tests.csproj --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/MicMeter.Tests/MicMeter.Tests.csproj --configuration Release --no-build --no-restore --logger "trx;LogFileName=test-results.trx"

      - name: Publish win-x64
        run: dotnet publish src/MicMeter/MicMeter.csproj --configuration Release --runtime win-x64 --self-contained false -p:PublishSingleFile=true --output artifacts/MicMeter-win-x64

      - name: Upload application
        uses: actions/upload-artifact@v7
        with:
          name: MicMeter-win-x64
          path: artifacts/MicMeter-win-x64/
          if-no-files-found: error

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: tests/MicMeter.Tests/TestResults/test-results.trx
          if-no-files-found: warn
